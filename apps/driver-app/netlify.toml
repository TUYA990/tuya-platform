[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { VITE_API_URL = "https://tuya-backend.railway.app" }

[headers]
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=3600"
